<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Exam System</title>
  <style>
    .hidden { display: none; }
    .section { margin-top: 20px; }
    button { margin: 5px 0; }
  </style>

  <!-- Load Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    let sbClient;

    async function initSupabase() {
      const res = await fetch("/api/env");
      const env = await res.json();

      sbClient = window.supabase.createClient(
        env.supabaseUrl,
        env.supabaseAnonKey
      );
    }
  </script>
</head>
<body>

  <h1>Exam System</h1>

  <!-- AUTH SECTION -->
  <div id="auth-section" class="section">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <!-- HOME SECTION -->
  <div id="home-section" class="section hidden">
    <h2>Dashboard</h2>
    <button onclick="generateExam()">Generate Exam</button>
    <button onclick="loadHistory()">View History</button>
    <button onclick="logout()">Logout</button>
     <div id="pending-exam-section" class="section hidden">
      <h3>Exam chưa nộp</h3>
      <p id="pending-exam-text"></p>
      <button onclick="resumePendingExam()">Làm tiếp</button>
    </div>
  </div>

  <!-- EXAM SECTION -->
  <div id="exam-section" class="section hidden">
    <h2>Exam</h2>
    <div id="exam-container">Loading exam...</div>
    <button onclick="submitExam()">Submit</button>
  </div>

  <!-- RESULT SECTION -->
  <div id="result-section" class="section hidden">
    <h2>Result</h2>
    <div id="result-container"></div>
    <button onclick="goHome()">Back to Home</button>
  </div>

  <!-- HISTORY SECTION -->
  <div id="history-section" class="section hidden">
    <h2>Exam History</h2>
    <div id="history-container"></div>
    <button onclick="goHome()">Back to Home</button>
  </div>

<script>

/* ===============================
   GLOBAL STATE
================================ */

let currentState = "auth";
let currentUser = null;
let currentExamId = null;

/* ===============================
   STATE MANAGEMENT
================================ */

function setState(state) {
  currentState = state;

  document.getElementById("auth-section").classList.add("hidden");
  document.getElementById("home-section").classList.add("hidden");
  document.getElementById("exam-section").classList.add("hidden");
  document.getElementById("result-section").classList.add("hidden");
  document.getElementById("history-section").classList.add("hidden");

  document.getElementById(state + "-section").classList.remove("hidden");
}

function goHome() {
  currentExamId = null;
  setState("home");
  loadPendingExam();
}

/* ===============================
   AUTH
================================ */

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await sbClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;
  setState("home");
  loadPendingExam();
}

async function logout() {
  await sbClient.auth.signOut();
  currentUser = null;
  currentExamId = null;
  setState("auth");
}

/* ===============================
   HOME ACTIONS
================================ */

async function generateExam() {
  const { data: { session } } = await sbClient.auth.getSession();

  const res = await fetch("/api/generate_exam", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session.access_token}`
    },
    body: JSON.stringify({
      grade_level: 12
    })
  });

  const data = await res.json();

  if (data.exam_id) {
    currentExamId = data.exam_id;
    loadExam(currentExamId);
  } else {
    if (data.error === "Unsubmitted exam exists") {
      await loadPendingExam();
    }
    alert(data.error || "Error generating exam");
  }
}

async function loadPendingExam() {
  const pendingSection = document.getElementById("pending-exam-section");
  const pendingText = document.getElementById("pending-exam-text");

  const { data: { session } } = await sbClient.auth.getSession();
  if (!session) {
    pendingSection.classList.add("hidden");
    return;
  }

  const res = await fetch("/api/check_unsubmitted_exam", {
    headers: {
      "Authorization": `Bearer ${session.access_token}`
    }
  });

  const data = await res.json();

  if (res.ok && data.has_unsubmitted && data.exam_id) {
    currentExamId = data.exam_id;
    pendingText.innerText = `Bạn đang có Exam #${data.exam_id} chưa submit.`;
    pendingSection.classList.remove("hidden");
    return;
  }

  pendingSection.classList.add("hidden");
}

function resumePendingExam() {
  if (!currentExamId) {
    alert("Không tìm thấy exam chưa submit.");
    return;
  }

  loadExam(currentExamId);
}

/* ===============================
   LOAD EXAM
================================ */

async function loadExam(examId) {
  setState("exam");

  const { data: { session } } = await sbClient.auth.getSession();

  const res = await fetch(`/api/get_exam_details?exam_id=${examId}`, {
    headers: {
      "Authorization": `Bearer ${session?.access_token ?? ""}`
    }
  });

  const data = await res.json();

  if (!res.ok || !Array.isArray(data.questions)) {
    document.getElementById("exam-container").innerHTML = "Failed to load exam.";
    alert(data.error || "Error loading exam");
    return;
  }

  renderExam(data);
}

function renderExam(data) {
  const container = document.getElementById("exam-container");
  container.innerHTML = "";

  data.questions.forEach(q => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p><b>${q.question_order}. ${q.question_text}</b></p>
      ${q.options.map(o => `
        <label>
          <input type="radio" name="q-${q.question_id}" value="${o.id}">
          ${o.option_label}. ${o.option_text}
        </label><br>
      `).join("")}
      <hr>
    `;
    container.appendChild(div);
  });
}

/* ===============================
   SUBMIT
================================ */

async function submitExam() {
  const answers = [];

  const { data: { session } } = await sbClient.auth.getSession();

  document.querySelectorAll("input[type=radio]:checked")
    .forEach(input => {
      const questionId = input.name.replace("q-", "");
      answers.push({
        question_id: parseInt(questionId),
        selected_option_id: parseInt(input.value)
      });
    });

  const res = await fetch("/api/submit_exam", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session?.access_token ?? ""}`
    },
    body: JSON.stringify({
      exam_id: currentExamId,
      answers
    })
  });

  const data = await res.json();

  if (data.score !== undefined) {
    renderResult(data);
    document.getElementById("pending-exam-section").classList.add("hidden");
    setState("result");
  } else {
    alert(data.error || "Submit error");
  }
}

/* ===============================
   RESULT
================================ */

function renderResult(data) {
  const container = document.getElementById("result-container");
  container.innerHTML = `
    <p>Score: ${data.score} / ${data.total}</p>
  `;
}

/* ===============================
   HISTORY (placeholder)
================================ */

async function loadHistory() {
  setState("history");

  const { data: { session } } = await sbClient.auth.getSession();

  const container = document.getElementById("history-container");
  container.innerHTML = "Loading history...";

  const res = await fetch(`/api/get_user_exams`, {
      headers: {
        "Authorization": `Bearer ${session?.access_token ?? ""}`
      }
    });  const data = await res.json();

  if (!data.exams) {
    container.innerHTML = "No history found";
    return;
  }

  container.innerHTML = data.exams.map(e => `
    <div>
      <p>
        Exam #${e.id} |
        Score: ${e.score ?? "-"} / ${e.total_questions} |
        ${e.submitted_at ? "Submitted" : "Unfinished"}
      </p>
    </div>
  `).join("");
}

window.addEventListener("DOMContentLoaded", async () => {
  await initSupabase();

  const { data } = await sbClient.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    setState("home");
    loadPendingExam();
  } else {
    setState("auth");
  }
});

</script>

</body>
</html>
