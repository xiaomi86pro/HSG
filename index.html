<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Generate Exam</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f6f8;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      max-width: 600px;
    }

    button {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
      border-radius: 6px;
      margin-top: 20px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>Generate Exam Test</h1>

  <div class="card">
    <label>Template ID:</label>
    <input type="number" id="templateId" value="1" />

    <button onclick="generateExam()">Generate Exam</button>

    <pre id="result">Chưa có dữ liệu...</pre>
  </div>

  <script>
    async function generateExam() {
      const templateId = document.getElementById("templateId").value;
      const resultBox = document.getElementById("result");

      resultBox.textContent = "Đang tạo đề...";

      try {
        const response = await fetch("/api/generate-exam", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            template_id: Number(templateId)
          })
        });

        const data = await response.json();

        resultBox.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resultBox.textContent = "Lỗi: " + error.message;
      }
    }
  </script>

</body>
</html>
