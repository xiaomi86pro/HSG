<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Generate Exam</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f6f8;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      max-width: 600px;
    }

    button {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
      border-radius: 6px;
      margin-top: 20px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>Generate Exam Test</h1>

  <div class="card">
    
    <button onclick="generateExam()">Generate Exam</button>

    <pre id="result">Chưa có dữ liệu...</pre>

    <div id="examContainer" style="margin-top:20px;"></div>

  </div>

  <script>
  async function generateExam() {
    const resultBox = document.getElementById("result");
    const examContainer = document.getElementById("examContainer");

    resultBox.textContent = "Đang tạo đề...";
    examContainer.innerHTML = "";

    try {
      // 1️⃣ Generate exam
      const genRes = await fetch("/api/generate_exam", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id: "41b8cd6b-a213-4562-8ee2-5f1dee283704",
          grade_level: 12
        })
      });

      const genData = await genRes.json();

      if (!genData.exam_id) {
        resultBox.textContent = JSON.stringify(genData, null, 2);
        return;
      }

      const examId = genData.exam_id;
      resultBox.textContent = "Exam ID: " + examId;

      // 2️⃣ Load exam details
      const detailRes = await fetch(`/api/get_exam_details?exam_id=${examId}`);
      const detailData = await detailRes.json();

      renderExam(detailData);

    } catch (error) {
      resultBox.textContent = "Lỗi: " + error.message;
    }
  }

  function renderExam(data) {
    const examContainer = document.getElementById("examContainer");
    examContainer.innerHTML = "";

    if (!data.questions || data.questions.length === 0) {
      examContainer.innerHTML = "<p>Không có câu hỏi.</p>";
      return;
    }

    data.questions.forEach((q, index) => {
      const questionDiv = document.createElement("div");
      questionDiv.style.marginBottom = "20px";

      const title = document.createElement("h3");
      title.textContent = `Câu ${index + 1}: ${q.question_text}`;
      questionDiv.appendChild(title);

      q.options.forEach(opt => {
        const label = document.createElement("label");
        label.style.display = "block";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `question_${q.question_id}`;
        radio.value = opt.id;

        label.appendChild(radio);
        label.append(` ${opt.option_label}. ${opt.option_text}`);

        questionDiv.appendChild(label);
      });

      examContainer.appendChild(questionDiv);
    });

    // Add Submit Button
    const submitBtn = document.createElement("button");
    submitBtn.textContent = "Submit Exam";
    submitBtn.style.marginTop = "20px";
    submitBtn.onclick = () => submitExam(data.exam_id, data.questions);

    examContainer.appendChild(submitBtn);
  }

  async function submitExam(examId, questions) {
  const resultBox = document.getElementById("result");

  const answers = [];

  for (const q of questions) {
    const selected = document.querySelector(
      `input[name="question_${q.question_id}"]:checked`
    );

    if (!selected) {
      alert("Bạn phải chọn đáp án cho tất cả các câu.");
      return;
    }

    answers.push({
      question_id: q.question_id,
      selected_option_id: parseInt(selected.value)
    });
  }

  try {
    const res = await fetch("/api/submit_exam", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        exam_id: examId,
        answers: answers
      })
    });

    const data = await res.json();

    if (!res.ok) {
      resultBox.textContent = JSON.stringify(data, null, 2);
      return;
    }

    resultBox.textContent =
      `Điểm: ${data.score} / ${data.total}`;

    alert("Nộp bài thành công!");

  } catch (error) {
    resultBox.textContent = "Lỗi submit: " + error.message;
  }
}


</script>



</body>
</html>
