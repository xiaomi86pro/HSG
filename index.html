<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Generate Exam</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f6f8;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      max-width: 600px;
    }

    button {
      padding: 10px 16px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
      border-radius: 6px;
      margin-top: 20px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>Generate Exam Test</h1>

  <div class="card">
    <div id="authSection">
    <h3>Đăng nhập / Đăng ký</h3>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="signUp()">Register</button>
    <button onclick="signIn()">Login</button>
  </div>

  <div id="userInfo" style="display:none;">
    <p id="userEmail"></p>
    <button onclick="signOut()">Logout</button>
  </div>

    
    <button onclick="generateExam()">Generate Exam</button>

    <pre id="result">Chưa có dữ liệu...</pre>

    <div id="examContainer" style="margin-top:20px;"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://cfazavlfyigkuoylyrur.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmYXphdmxmeWlna3VveWx5cnVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NjcwOTgsImV4cCI6MjA4NjU0MzA5OH0.G3QfbM7S3hABaVpbpBwQlRjgd1Ri5SS9StirEF4e4Ko";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Đăng ký thành công. Kiểm tra email xác nhận.");
  }
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    handleSession(data.session);
  }
}

async function signOut() {
  await supabaseClient.auth.signOut();
  location.reload();
}

function handleSession(session) {
  if (!session) return;

  document.getElementById("authSection").style.display = "none";
  document.getElementById("userInfo").style.display = "block";
  document.getElementById("userEmail").textContent =
    "Logged in as: " + session.user.email;

  window.CURRENT_USER_ID = session.user.id;

  checkUnsubmittedExam();
}

   // const USER_ID = "41b8cd6b-a213-4562-8ee2-5f1dee283704";

    async function checkUnsubmittedExam() {
  const resultBox = document.getElementById("result");
  const examContainer = document.getElementById("examContainer");

  try {
    const res = await fetch(
      `/api/check_unsubmitted_exam?user_id=${window.CURRENT_USER_ID}`
    );

    const data = await res.json();

    if (data.has_unsubmitted) {
      resultBox.textContent =
        "Bạn có bài thi đang làm dở.";

      examContainer.innerHTML = `
        <button onclick="resumeExam(${data.exam_id})">
          Tiếp tục
        </button>
        <button onclick="cancelExam(${data.exam_id})"
                style="margin-left:10px;">
          Huỷ
        </button>
      `;
    }

  } catch (error) {
    resultBox.textContent =
      "Lỗi check exam: " + error.message;
  }
}

async function resumeExam(examId) {
  const res = await fetch(
    `/api/get_exam_details?exam_id=${examId}`
  );

  const data = await res.json();
  renderExam(data);
}

async function cancelExam(examId) {
  const confirmCancel = confirm(
    "Bạn chắc chắn muốn huỷ bài thi?"
  );

  if (!confirmCancel) return;

  await fetch(`/api/cancel_exam`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ exam_id: examId })
  });

  location.reload();
}

  async function generateExam() {
    if (!window.CURRENT_USER_ID) {
  alert("Bạn cần đăng nhập trước.");
  return;
}
    const resultBox = document.getElementById("result");
    const examContainer = document.getElementById("examContainer");

    resultBox.textContent = "Đang tạo đề...";
    examContainer.innerHTML = "";

    try {
      // 1️⃣ Generate exam
      const genRes = await fetch("/api/generate_exam", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id: window.CURRENT_USER_ID,
          grade_level: 12
        })
      });

      const genData = await genRes.json();

      if (!genData.exam_id) {
        resultBox.textContent = JSON.stringify(genData, null, 2);
        return;
      }

      const examId = genData.exam_id;
      resultBox.textContent = "Exam ID: " + examId;

      // 2️⃣ Load exam details
      const detailRes = await fetch(`/api/get_exam_details?exam_id=${examId}`);
      const detailData = await detailRes.json();

      renderExam(detailData);

    } catch (error) {
      resultBox.textContent = "Lỗi: " + error.message;
    }
  }

  function renderExam(data) {
    const examContainer = document.getElementById("examContainer");
    examContainer.innerHTML = "";

    if (!data.questions || data.questions.length === 0) {
      examContainer.innerHTML = "<p>Không có câu hỏi.</p>";
      return;
    }

    data.questions.forEach((q, index) => {
      const questionDiv = document.createElement("div");
      questionDiv.style.marginBottom = "20px";

      const title = document.createElement("h3");
      title.textContent = `Câu ${index + 1}: ${q.question_text}`;
      questionDiv.appendChild(title);

      q.options.forEach(opt => {
        const label = document.createElement("label");
        label.style.display = "block";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `question_${q.question_id}`;
        radio.value = opt.id;

        label.appendChild(radio);
        label.append(` ${opt.option_label}. ${opt.option_text}`);

        questionDiv.appendChild(label);
      });

      examContainer.appendChild(questionDiv);
    });

    // Add Submit Button
    const submitBtn = document.createElement("button");
    submitBtn.textContent = "Submit Exam";
    submitBtn.style.marginTop = "20px";
    submitBtn.onclick = () => submitExam(data.exam_id, data.questions);

    examContainer.appendChild(submitBtn);
  }

  async function submitExam(examId, questions) {
  const resultBox = document.getElementById("result");

  const answers = [];

  for (const q of questions) {
    const selected = document.querySelector(
      `input[name="question_${q.question_id}"]:checked`
    );

    if (!selected) {
      alert("Bạn phải chọn đáp án cho tất cả các câu.");
      return;
    }

    answers.push({
      question_id: q.question_id,
      selected_option_id: parseInt(selected.value)
    });
  }

  try {
    const res = await fetch("/api/submit_exam", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        exam_id: examId,
        answers: answers
      })
    });

    const data = await res.json();

    if (!res.ok) {
      resultBox.textContent = JSON.stringify(data, null, 2);
      return;
    }

    alert(`Điểm: ${data.score} / ${data.total}`);

    loadReview(examId)

  } catch (error) {
    resultBox.textContent = "Lỗi submit: " + error.message;
  }
}

async function loadReview(examId) {
  const res = await fetch(
    `/api/get_exam_review?exam_id=${examId}`
  );

  const data = await res.json();

  renderReview(data);
}

function renderReview(data) {
  const examContainer = document.getElementById("examContainer");
  examContainer.innerHTML = "";

  data.questions.forEach((q, index) => {
    const questionDiv = document.createElement("div");
    questionDiv.style.marginBottom = "20px";

    const title = document.createElement("h3");
    title.textContent = `Câu ${index + 1}: ${q.question_text}`;
    questionDiv.appendChild(title);

    q.options.forEach(opt => {
      const label = document.createElement("label");
      label.style.display = "block";

      const radio = document.createElement("input");
      radio.type = "radio";
      radio.disabled = true;
      radio.checked = opt.is_selected;

      // Highlight logic
      if (opt.is_correct) {
        label.style.color = "green";
      }

      if (opt.is_selected && !opt.is_correct) {
        label.style.color = "red";
      }

      label.appendChild(radio);
      label.append(` ${opt.option_label}. ${opt.option_text}`);

      questionDiv.appendChild(label);
    });

    if (q.explanation) {
      const explanation = document.createElement("p");
      explanation.textContent =
        "Giải thích: " + q.explanation;
      explanation.style.fontStyle = "italic";
      questionDiv.appendChild(explanation);
    }

    examContainer.appendChild(questionDiv);
  });
}

window.onload = async function () {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    handleSession(data.session);
  }
};



</script>



</body>
</html>
