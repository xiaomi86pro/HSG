<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Exam System</title>
  <style>
    .hidden { display: none; }
    .section { margin-top: 20px; }
    button { margin: 5px 0; }
  </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
    let supabase = null;

    async function initSupabase() {
      const res = await fetch("/api/env");
      const env = await res.json();

      supabase = window.supabase.createClient(
        env.supabaseUrl,
        env.supabaseAnonKey
      );
    }
    </script>
</head>
<body>

  <h1>Exam System</h1>

  <!-- AUTH SECTION -->
  <div id="auth-section" class="section">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <!-- HOME SECTION -->
  <div id="home-section" class="section hidden">
    <h2>Dashboard</h2>
    <button onclick="generateExam()">Generate Exam</button>
    <button onclick="loadHistory()">View History</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- EXAM SECTION -->
  <div id="exam-section" class="section hidden">
    <h2>Exam</h2>
    <div id="exam-container">Loading exam...</div>
    <button onclick="submitExam()">Submit</button>
  </div>

  <!-- RESULT SECTION -->
  <div id="result-section" class="section hidden">
    <h2>Result</h2>
    <div id="result-container"></div>
    <button onclick="goHome()">Back to Home</button>
  </div>

  <!-- HISTORY SECTION -->
  <div id="history-section" class="section hidden">
    <h2>Exam History</h2>
    <div id="history-container"></div>
    <button onclick="goHome()">Back to Home</button>
  </div>

<script>

/* ===============================
   GLOBAL STATE
================================ */

let currentState = "auth";
let currentUser = null;
let currentExamId = null;

/* ===============================
   STATE MANAGEMENT
================================ */

function setState(state) {
  currentState = state;

  document.getElementById("auth-section").classList.add("hidden");
  document.getElementById("home-section").classList.add("hidden");
  document.getElementById("exam-section").classList.add("hidden");
  document.getElementById("result-section").classList.add("hidden");
  document.getElementById("history-section").classList.add("hidden");

  document.getElementById(state + "-section").classList.remove("hidden");
}

/* ===============================
   AUTH
================================ */

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;
  setState("home");
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  currentExamId = null;
  setState("auth");
}

/* ===============================
   HOME ACTIONS
================================ */

async function generateExam() {
  const res = await fetch("/api/generate_exam", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: currentUser.id,
      grade_level: 12
    })
  });

  const data = await res.json();

  if (data.exam_id) {
    currentExamId = data.exam_id;
    loadExam(currentExamId);
  } else {
    alert(data.error || "Error generating exam");
  }
}

function goHome() {
  setState("home");
}

/* ===============================
   LOAD EXAM
================================ */

async function loadExam(examId) {
  setState("exam");

  const res = await fetch(`/api/get_exam_details?exam_id=${examId}`);
  const data = await res.json();

  renderExam(data);
}

function renderExam(data) {
  const container = document.getElementById("exam-container");
  container.innerHTML = "";

  data.questions.forEach(q => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p><b>${q.question_order}. ${q.question_text}</b></p>
      ${q.options.map(o => `
        <label>
          <input type="radio" name="q-${q.question_id}" value="${o.id}">
          ${o.option_label}. ${o.option_text}
        </label><br>
      `).join("")}
      <hr>
    `;
    container.appendChild(div);
  });
}

/* ===============================
   SUBMIT
================================ */

async function submitExam() {
  const answers = [];

  document.querySelectorAll("input[type=radio]:checked")
    .forEach(input => {
      const questionId = input.name.replace("q-", "");
      answers.push({
        question_id: parseInt(questionId),
        selected_option_id: parseInt(input.value)
      });
    });

  const res = await fetch("/api/submit_exam", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      exam_id: currentExamId,
      answers
    })
  });

  const data = await res.json();

  if (data.score !== undefined) {
    renderResult(data);
    setState("result");
  } else {
    alert(data.error || "Submit error");
  }
}

/* ===============================
   RESULT
================================ */

function renderResult(data) {
  const container = document.getElementById("result-container");
  container.innerHTML = `
    <p>Score: ${data.score} / ${data.total}</p>
  `;
}

/* ===============================
   HISTORY (placeholder)
================================ */

async function loadHistory() {
  setState("history");
  document.getElementById("history-container").innerHTML = "Loading history...";
}

async function bootstrap() {
  await initSupabase();

  const { data } = await supabase.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    setState("home");
  } else {
    setState("auth");
  }
}

bootstrap();

</script>

</body>
</html>
